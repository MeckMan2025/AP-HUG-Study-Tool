<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APHUG Study Tool</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pastel-blue: #A8D8EA;
      --pastel-blue-dark: #7EC8E3;
      --pastel-pink: #FFCAD4;
      --pastel-pink-dark: #F4A3B5;
      --pastel-orange: #FFD6A5;
      --pastel-orange-dark: #FFBB70;
      --pastel-green: #B5EAD7;
      --pastel-green-dark: #8FD5BA;
      --pastel-purple: #C3B1E1;
      --pastel-purple-dark: #A78BCA;
      --pastel-yellow: #FFEAA7;
      --pastel-yellow-dark: #FDCB6E;
      --bg: #f8fafc;
      --text-primary: #374151;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --white-90: rgba(255,255,255,0.9);
      --white-80: rgba(255,255,255,0.8);
      --white-50: rgba(255,255,255,0.5);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--pastel-blue) 0%, var(--pastel-pink) 50%, var(--pastel-orange) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--white-90);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--white-50);
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
      z-index: 1000;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .sidebar-toggle {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--pastel-blue);
      color: var(--text-primary);
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .sidebar-toggle:hover {
      background: var(--pastel-blue-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--pastel-blue-dark), var(--pastel-pink-dark), var(--pastel-orange-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-btn {
      padding: 8px 20px;
      border: none;
      background: var(--pastel-blue);
      color: var(--text-primary);
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      opacity: 0.5;
    }

    .mode-btn:hover {
      opacity: 0.75;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .mode-btn.active {
      background: var(--pastel-pink);
      opacity: 1;
      box-shadow: var(--shadow-md);
    }

    .score-display {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--white-80);
      padding: 6px 14px;
      border-radius: 20px;
      min-width: 80px;
      text-align: center;
    }

    .score-display span {
      color: var(--pastel-pink-dark);
      font-weight: 700;
    }

    /* ── Sidebar ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: 1500;
    }

    .sidebar-overlay.open { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--white-90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-xl);
      z-index: 2000;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--white-50);
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--white-50);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .sidebar-close {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .sidebar-close:hover {
      background: var(--pastel-pink);
      color: var(--text-primary);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .sidebar-section {
      margin-bottom: 8px;
    }

    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 8px 10px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item:hover {
      background: var(--pastel-blue);
      background-opacity: 0.3;
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: var(--pastel-pink);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .sidebar-item .item-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .sidebar-item .item-label {
      flex: 1;
      line-height: 1.3;
    }

    .sidebar-item .item-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--white-80);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .sidebar-item.active .item-count {
      background: rgba(255,255,255,0.6);
      color: var(--text-secondary);
    }

    /* ── Sidebar panels (units list + unit detail) ── */
    .sidebar-panels {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    .sidebar-panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 12px;
      transition: transform 0.25s ease;
    }

    .panel-units {
      transform: translateX(0);
    }

    .panel-units.hidden {
      transform: translateX(-100%);
    }

    .panel-detail {
      transform: translateX(100%);
    }

    .panel-detail.visible {
      transform: translateX(0);
    }

    .unit-tab {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      border-radius: 14px;
      transition: all 0.2s;
      text-align: left;
      margin-bottom: 4px;
    }

    .unit-tab:hover {
      background: var(--pastel-blue);
    }

    .unit-tab .unit-number {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .unit-tab .unit-info {
      flex: 1;
      min-width: 0;
    }

    .unit-tab .unit-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      display: block;
    }

    .unit-tab .unit-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unit-tab .unit-arrow {
      color: var(--text-muted);
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    /* Detail panel header */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px 14px;
      border-bottom: 1px solid var(--white-50);
      margin-bottom: 12px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--pastel-blue);
      color: var(--text-primary);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--pastel-blue-dark);
      transform: translateX(-2px);
    }

    .detail-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .detail-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .unit-empty {
      padding: 14px 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 500;
      text-align: center;
    }

    /* Expandable reading quiz parent */
    .sidebar-item-expand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item-expand:hover {
      background: var(--pastel-blue);
      color: var(--text-primary);
    }

    .sidebar-item-expand.open {
      background: var(--white-80);
      color: var(--text-primary);
      font-weight: 600;
    }

    .sidebar-item-expand .expand-arrow {
      font-size: 0.5rem;
      color: var(--text-muted);
      transition: transform 0.2s;
      margin-left: auto;
    }

    .sidebar-item-expand.open .expand-arrow {
      transform: rotate(90deg);
    }

    .expand-children {
      display: none;
      padding-left: 18px;
      padding-bottom: 4px;
    }

    .expand-children.open {
      display: block;
    }

    .expand-children .sidebar-item {
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .expand-children .sidebar-item .item-icon {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    /* ── Reading quiz view ── */
    .reading-quiz-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 30px 20px;
    }

    .rq-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .rq-title {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--pastel-blue-dark), var(--pastel-pink-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .rq-topic {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Section buttons grid */
    .rq-sections {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 700px;
      margin: 0 auto;
    }

    .rq-section-btn {
      padding: 12px 20px;
      border: none;
      background: var(--white-90);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      min-width: 120px;
      text-align: center;
    }

    .rq-section-btn:hover {
      background: var(--pastel-blue);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .rq-section-btn.overall {
      background: var(--pastel-pink);
      font-weight: 700;
    }

    .rq-section-btn.overall:hover {
      background: var(--pastel-pink-dark);
    }

    /* Quiz question card */
    .rq-quiz {
      max-width: 650px;
      margin: 0 auto;
      width: 100%;
    }

    .rq-progress {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .rq-progress-bar {
      width: 100%;
      height: 6px;
      background: var(--white-80);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .rq-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pastel-blue-dark), var(--pastel-pink-dark));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .rq-card {
      background: var(--white-90);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--white-50);
      margin-bottom: 16px;
    }

    .rq-question {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .rq-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rq-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border: 2px solid rgba(0,0,0,0.06);
      background: var(--white-80);
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .rq-option:hover:not(.answered) {
      border-color: var(--pastel-blue-dark);
      background: var(--pastel-blue);
      transform: translateX(4px);
    }

    .rq-option .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: var(--white-90);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .rq-option.correct {
      border-color: var(--pastel-green-dark);
      background: var(--pastel-green);
    }

    .rq-option.correct .option-letter {
      background: var(--pastel-green-dark);
      color: white;
    }

    .rq-option.wrong {
      border-color: var(--pastel-pink-dark);
      background: var(--pastel-pink);
    }

    .rq-option.wrong .option-letter {
      background: var(--pastel-pink-dark);
      color: white;
    }

    .rq-option.answered {
      cursor: default;
      opacity: 0.7;
    }

    .rq-option.correct.answered,
    .rq-option.wrong.answered {
      opacity: 1;
    }

    .rq-next-btn {
      display: block;
      margin: 20px auto 0;
      padding: 12px 32px;
      border: none;
      background: var(--pastel-pink);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-md);
    }

    .rq-next-btn:hover {
      background: var(--pastel-pink-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Results screen */
    .rq-results {
      text-align: center;
      padding: 40px 20px;
    }

    .rq-results .rq-score {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--pastel-blue-dark), var(--pastel-pink-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .rq-results .rq-score-label {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 24px;
    }

    .rq-retry-btn {
      padding: 12px 28px;
      border: none;
      background: var(--pastel-green);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-md);
      margin: 0 6px;
    }

    .rq-retry-btn:hover {
      background: var(--pastel-green-dark);
      transform: translateY(-2px);
    }

    .rq-back-sections-btn {
      padding: 12px 28px;
      border: none;
      background: var(--pastel-blue);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-md);
      margin: 0 6px;
    }

    .rq-back-sections-btn:hover {
      background: var(--pastel-blue-dark);
      transform: translateY(-2px);
    }

    /* ── Redo styles ── */
    .rq-redo-btn {
      padding: 12px 28px;
      border: none;
      background: var(--pastel-pink);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-md);
      margin: 0 6px;
    }

    .rq-redo-btn:hover {
      background: var(--pastel-pink-dark);
      transform: translateY(-2px);
    }

    .rq-redo-hint {
      font-size: 0.85rem;
      color: var(--pastel-pink-dark);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .redo-label {
      display: inline-block;
      background: var(--pastel-pink);
      color: var(--text-primary);
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 4px;
      vertical-align: middle;
    }

    .sidebar-item-redo.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .redo-count {
      background: var(--pastel-pink-dark);
      color: white;
    }

    /* ── Main content area ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #prompt-bar {
      background: var(--white-90);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      padding: 14px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--white-50);
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    #prompt-bar .target-name {
      color: var(--text-primary);
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--pastel-pink-dark), var(--pastel-orange-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #prompt-bar .feedback {
      font-size: 0.95rem;
      padding: 5px 16px;
      border-radius: 20px;
      font-weight: 600;
    }

    .feedback.correct {
      background: var(--pastel-green);
      color: #166534;
    }

    .feedback.wrong {
      background: var(--pastel-pink);
      color: #991b1b;
    }

    #map {
      flex: 1;
      background: #e8f4f8;
    }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      background: var(--white-90) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border-radius: 16px !important;
      box-shadow: var(--shadow-xl) !important;
      border: 1px solid var(--white-50) !important;
      padding: 0 !important;
    }

    .leaflet-popup-tip { background: var(--white-90) !important; }
    .leaflet-popup-content { margin: 0 !important; }

    .info-popup {
      padding: 14px 18px;
      color: var(--text-primary);
      font-size: 0.9rem;
      min-width: 160px;
    }

    .info-popup h3 {
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 1.05rem;
      background: linear-gradient(135deg, var(--pastel-blue-dark), var(--pastel-pink-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .info-popup .region {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .leaflet-container { background: #e8f4f8; }

    .leaflet-control-zoom a {
      background: var(--white-90) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--white-50) !important;

      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 16px !important;

    .leaflet-control-zoom { border: none !important; border-radius: 12px !important; overflow: hidden; box-shadow: var(--shadow-md) !important; }

    .streak {
      color: var(--pastel-orange-dark);
      font-weight: 700;

    .skip-btn {

      background: var(--pastel-purple);
      color: var(--text-primary);
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
      opacity: 0.7;

    .skip-btn:hover {
      opacity: 1;
      background: var(--pastel-purple-dark);
      transform: translateY(-1px);

    }

    .leaflet-control-attribution {
      background: var(--white-80) !important;
      backdrop-filter: blur(8px) !important;
      border-radius: 8px 0 0 0 !important;
      font-size: 0.65rem !important;
      color: var(--text-muted) !important;
    }

    .leaflet-control-attribution a { color: var(--text-secondary) !important; }

    /* Loading spinner */
    .loading-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid var(--pastel-pink);
      border-top-color: var(--pastel-pink-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
      header h1 { font-size: 1.1rem; }
      .mode-btn { padding: 6px 14px; font-size: 0.8rem; }
      .header-controls { gap: 8px; }
      .sidebar { width: 240px; }

    .sidebar-credit {

      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;

    /* ── Review flashcard styles ── */
    .review-view {
      flex: 1;

      flex-direction: column;
      overflow-y: auto;
      padding: 24px;

    }

    .review-header {
      text-align: center;
      margin-bottom: 4px;
    }

    .review-header .review-title {

      font-weight: 700;

      color: var(--text-secondary);
      margin-top: 4px;

    .review-levels {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;

    .review-level-box {
      background: var(--white-80);
      border: 2px solid var(--white-50);
      border-radius: 10px;
      padding: 8px 14px;
      text-align: center;
      min-width: 56px;

      border-color: var(--pastel-green-dark);
      background: var(--pastel-green);
    }

    .review-level-box .level-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .review-level-box .level-count {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .review-progress-bar {
      width: 100%;
      height: 8px;
      background: var(--white-50);
      border-radius: 4px;
      overflow: hidden;
    }

    .review-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pastel-green), var(--pastel-green-dark));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .review-card-area {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      perspective: 1000px;
      min-height: 280px;
    }

    .review-card-wrapper {
      width: 100%;
      max-width: 520px;
      min-height: 260px;
      position: relative;
      cursor: pointer;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .review-card-wrapper.flipped {
      transform: rotateY(180deg);
    }

    .review-card-front, .review-card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 16px;
      padding: 28px 24px;
      background: var(--white-90);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
    }

    .review-card-front {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .review-card-front .term-text {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .review-card-front .flip-hint {

      color: var(--text-muted);
      margin-top: 16px;
    }

    .review-card-back {
      transform: rotateY(180deg);
      gap: 10px;
      overflow-y: auto;
    }

    .review-card-back .def-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .review-card-back .card-section {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .review-card-back .card-section strong {
      color: var(--text-primary);
    }

    .review-card-back .card-section ul {
      margin: 2px 0 0 16px;
    }

    .review-card-back .card-section ul li {
      margin-bottom: 2px;
    }

    .review-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
    }

    .review-btn {
      border: none;
      padding: 10px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .review-btn.got-it {
      background: var(--pastel-green);
      color: var(--text-primary);
    }

    .review-btn.got-it:hover {
      background: var(--pastel-green-dark);
    }

    .review-btn.study-again {
      background: var(--pastel-pink);
      color: var(--text-primary);
    }

    .review-btn.study-again:hover {
      background: var(--pastel-pink-dark);
    }

    .review-done {
      text-align: center;
      padding: 40px 20px;
    }

    .review-done h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .review-done p {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .review-restart-btn {
      margin-top: 16px;

      padding: 10px 24px;

      background: var(--pastel-green);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .review-restart-btn:hover {
      background: var(--pastel-green-dark);

</head>

  <script>
    // ── State ──
    let mode = 'explore';
    let currentMapId = 'world';
    let geoData = null;
    let geoLayer = null;
    let score = 0;
    let total = 0;
    let streak = 0;
    let currentTarget = null;
    let answered = false;
    let quizQueue = [];
    let redoMode = false; // true when practicing only wrong answers

    // ── Redo tracking (persisted to localStorage) ──
    function getRedoData() {
      try { return JSON.parse(localStorage.getItem('aphug-redo') || '{}'); } catch { return {}; }
    }
    function saveRedoData(data) {
      localStorage.setItem('aphug-redo', JSON.stringify(data));
    }
    function addToRedo(unitNum, type, key) {
      // type: 'map' or 'reading', key: feature name or question text
      const data = getRedoData();
      const uKey = `unit${unitNum}`;
      if (!data[uKey]) data[uKey] = {};
      if (!data[uKey][type]) data[uKey][type] = [];
      if (!data[uKey][type].includes(key)) data[uKey][type].push(key);
      saveRedoData(data);
    }
    function removeFromRedo(unitNum, type, key) {
      const data = getRedoData();
      const uKey = `unit${unitNum}`;
      if (data[uKey] && data[uKey][type]) {
        data[uKey][type] = data[uKey][type].filter(k => k !== key);
        if (data[uKey][type].length === 0) delete data[uKey][type];
        if (Object.keys(data[uKey]).length === 0) delete data[uKey];
      }
      saveRedoData(data);
    }
    function getRedoCount(unitNum) {
      const data = getRedoData();
      const uKey = `unit${unitNum}`;
      if (!data[uKey]) return 0;
      let count = 0;
      if (data[uKey].map) count += data[uKey].map.length;
      if (data[uKey].reading) count += data[uKey].reading.length;
      return count;
    }
    function getRedoItems(unitNum, type) {
      const data = getRedoData();
      const uKey = `unit${unitNum}`;
      if (!data[uKey] || !data[uKey][type]) return [];
      return data[uKey][type];
    }
    function clearRedo(unitNum) {
      const data = getRedoData();
      delete data[`unit${unitNum}`];
      saveRedoData(data);
    }
    // Figure out which unit a map belongs to
    function getUnitForMap(mapId) {
      for (const [uNum, unit] of Object.entries(unitData)) {
        if (unit.items && unit.items.some(item => item.map === mapId)) return uNum;
      }
      return null;
    }

    // ── Map datasets config ──

    // ── Load a map dataset ──

    function loadMap(mapId) {
      currentMapId = mapId;
      const config = MAP_CONFIGS[mapId];

      // Reset quiz state
      score = 0; total = 0; streak = 0; quizQueue = [];
      if (mode === 'explore') {
        document.getElementById('prompt-bar').innerHTML = '<span>Click to explore!</span>';
        document.getElementById('score-display').innerHTML = '';
      }

      // Update sidebar active
      document.querySelectorAll('.sidebar-item').forEach(el => {
        el.classList.toggle('active', el.dataset.map === mapId);
      });

      // Set map view
      map.setView(config.center, config.zoom);
      map.setMinZoom(config.minZoom);
      map.setMaxZoom(config.maxZoom);

      // Load data (cached by URL, then filter per map)
      const urlKey = config.url;

      function applyData(rawData) {
        let data = rawData;
        if (config.filter) {
          data = { ...rawData, features: rawData.features.filter(config.filter) };
        }
        dataCache[mapId] = data;
        geoData = data;
        buildMap();
        if (mode === 'quiz') {
          startQuiz();
        } else {
          document.getElementById('prompt-bar').innerHTML = '<span>Click to explore!</span>';
        }
      }

      if (dataCache[mapId]) {
        geoData = dataCache[mapId];
        buildMap();
        if (mode === 'quiz') startQuiz();
        return;
      }

      // Check if raw URL data is already cached
      if (urlCache[urlKey]) {
        applyData(urlCache[urlKey]);
        return;
      }

      // Show loading
      document.getElementById('prompt-bar').innerHTML =
        '<div class="loading-bar"><div class="spinner"></div><span>Loading map data...</span></div>';

      fetch(config.url)
        .then(r => r.json())
        .then(data => {
          if (config.postProcess) config.postProcess(data);
          urlCache[urlKey] = data;
          applyData(data);
        })
        .catch(err => {
          document.getElementById('prompt-bar').innerHTML =
            '<span style="color:#991b1b">Failed to load map data.</span>';
          console.error(err);
        });
    }

    function buildMap() {
      if (geoLayer) map.removeLayer(geoLayer);

      geoLayer = L.geoJSON(geoData, {
        style: featureStyle,
        onEachFeature: (feature, layer) => {
          layer.on({
            mouseover: (e) => {
              if (mode === 'quiz' && answered) return;
              e.target.setStyle(featureHighlight(feature));
              e.target.bringToFront();
            },
            mouseout: (e) => {
              if (mode === 'quiz' && answered) return;
              geoLayer.resetStyle(e.target);
            },
            click: (e) => handleClick(feature, layer, e)
          });
        }
      }).addTo(map);
    }

    // ── Click handler ──
    function handleClick(feature, layer, e) {
      const name = featureName(feature);
      const group = featureGroup(feature);

      if (mode === 'explore') {
        L.popup({ className: 'info-popup-wrapper' })
          .setLatLng(e.latlng)
          .setContent(`
            <div class="info-popup">
              <h3>${name}</h3>
              <div class="region">${group}</div>
            </div>
          `)
          .openOn(map);
      } else if (mode === 'quiz') {
        if (answered) return;
        answered = true;
        total++;

        const correct = name === featureName(currentTarget);
        const bar = document.getElementById('prompt-bar');

        if (correct) {
          score++;
          streak++;
          layer.setStyle({ fillColor: '#B5EAD7', fillOpacity: 0.85, weight: 2.5, color: '#6DBF9E' });
          bar.innerHTML = `
            <span class="feedback correct">Correct!</span>
            <span class="target-name">${name}</span>
            ${streak >= 3 ? `<span class="streak">${streak} streak!</span>` : ''}
          `;
          // Remove from redo if they got it right
          const mapUnit = getUnitForMap(currentMapId);
          if (mapUnit) removeFromRedo(mapUnit, 'map', featureName(currentTarget));
        } else {
          streak = 0;
          layer.setStyle({ fillColor: '#FFCAD4', fillOpacity: 0.85, weight: 2.5, color: '#E88A9A' });
          geoLayer.eachLayer(l => {
            if (l.feature === currentTarget) {
              l.setStyle({ fillColor: '#B5EAD7', fillOpacity: 0.85, weight: 2.5, color: '#6DBF9E' });
              l.bringToFront();
            }
          });
          bar.innerHTML = `
            <span class="feedback wrong">That was ${name}</span>
            <span style="color:var(--text-muted)">&rarr; Correct:</span>
            <span class="target-name">${featureName(currentTarget)}</span>
          `;
          // Save to redo list
          const mapUnit = getUnitForMap(currentMapId);
          if (mapUnit) addToRedo(mapUnit, 'map', featureName(currentTarget));
        }

        updateScore();
        setTimeout(() => nextQuizQuestion(), 2000);
      }
    }

    // ── Quiz ──
    function startQuiz() {
      score = 0; total = 0; streak = 0; quizQueue = [];

    function nextQuizQuestion() {
      answered = false;
      if (geoLayer) geoLayer.eachLayer(l => geoLayer.resetStyle(l));

      const features = geoData ? geoData.features : [];
      if (features.length === 0) {
        document.getElementById('prompt-bar').innerHTML =
          '<span style="color:#991b1b">No data loaded.</span>';
        return;
      }

      if (quizQueue.length === 0) {
        if (redoMode) {
          // Redo is done — show completion
          const pct = total > 0 ? Math.round((score / total) * 100) : 0;
          document.getElementById('prompt-bar').innerHTML = `
            <span class="redo-label">REDO DONE</span>
            <span style="font-weight:700;">${score}/${total} correct (${pct}%)</span>

          `;
          redoMode = false;
          return;
        }
        quizQueue = [...features];
        shuffle(quizQueue);
      }

      currentTarget = quizQueue.pop();
      const name = featureName(currentTarget);

      document.getElementById('prompt-bar').innerHTML = `
        <span>Click on:</span>
        <span class="target-name">${name}</span>
        <button class="skip-btn" onclick="skipQuestion()">Skip</button>
      `;
    }

      if (answered) return;

      for (let i = arr.length - 1; i > 0; i--) {

    // ── Review System Functions ──
    function getReviewLevels(unitNum) {
      const key = `reviewLevels_unit${unitNum}`;
      const stored = localStorage.getItem(key);
      if (stored) return JSON.parse(stored);
      // Initialize all cards at level 1
      const levels = {};
      const unitReview = reviewData[unitNum];
      if (!unitReview) return levels;
      for (const cat of Object.keys(unitReview)) {
        for (const card of unitReview[cat]) {
          levels[card.term] = 1;
        }
      }
      localStorage.setItem(key, JSON.stringify(levels));
      return levels;
    }

    function saveReviewLevels(unitNum, levels) {
      localStorage.setItem(`reviewLevels_unit${unitNum}`, JSON.stringify(levels));
    }

    function showReviewCategory(unitNum, categoryName) {
      const unitReview = reviewData[unitNum];
      if (!unitReview) return;

      let cards = [];
      if (categoryName === 'Overall') {
        for (const cat of Object.keys(unitReview)) {
          cards = cards.concat(unitReview[cat]);
        }
      } else {
        cards = [...unitReview[categoryName]];
      }

      document.getElementById('map').style.display = 'none';
      let existing = document.getElementById('reading-quiz-container');
      if (existing) existing.remove();
      existing = document.getElementById('review-container');
      if (existing) existing.remove();

      const container = document.createElement('div');
      container.id = 'review-container';
      container.className = 'review-view';
      document.querySelector('.main-area').appendChild(container);
      document.getElementById('prompt-bar').innerHTML = `<span>Review &mdash; ${categoryName}</span>`;

      const levels = getReviewLevels(unitNum);

      // Filter to cards not yet mastered (level < 5), shuffle
      let studyCards = cards.filter(c => (levels[c.term] || 1) < 5);
      // Sort by level ascending so lowest-level cards come first
      studyCards.sort((a, b) => (levels[a.term] || 1) - (levels[b.term] || 1));

      let currentIdx = 0;

      function renderState() {
        // Recompute level counts
        const lvlCounts = [0, 0, 0, 0, 0];
        for (const c of cards) {
          const lv = levels[c.term] || 1;
          lvlCounts[lv - 1]++;
        }
        const mastered = lvlCounts[4];
        const pct = Math.round((mastered / cards.length) * 100);

        let html = '';
        html += `<div class="review-header"><div class="review-title">Review: ${categoryName}</div><div class="review-category">${cards.length} terms &middot; ${mastered} mastered</div></div>`;

        // Level boxes
        html += '<div class="review-levels">';
        for (let i = 0; i < 5; i++) {
          html += `<div class="review-level-box${i === 4 && mastered > 0 ? ' active' : ''}"><div class="level-label">L${i+1}</div><div class="level-count">${lvlCounts[i]}</div></div>`;
        }
        html += '</div>';

        // Progress bar
        html += `<div class="review-progress-bar"><div class="review-progress-fill" style="width:${pct}%"></div></div>`;

        if (studyCards.length === 0 || currentIdx >= studyCards.length) {
          html += `<div class="review-done"><h2>All cards mastered!</h2><p>You've completed all ${cards.length} flashcards in this set.</p><button class="review-restart-btn" id="review-restart">Study Again from Scratch</button></div>`;
          container.innerHTML = html;
          const restartBtn = document.getElementById('review-restart');
          if (restartBtn) {
            restartBtn.addEventListener('click', () => {
              for (const c of cards) levels[c.term] = 1;
              saveReviewLevels(unitNum, levels);
              studyCards = [...cards];
              studyCards.sort(() => Math.random() - 0.5);
              currentIdx = 0;
              renderState();
            });
          }
          return;
        }

        const card = studyCards[currentIdx];
        const cardLevel = levels[card.term] || 1;

        // Card area
        html += '<div class="review-card-area"><div class="review-card-wrapper" id="review-card">';
        // Front
        html += `<div class="review-card-front"><div class="term-text">${card.term}</div><div class="flip-hint">Click to reveal &middot; Level ${cardLevel}/5</div></div>`;
        // Back
        html += '<div class="review-card-back">';
        html += `<div class="def-text">${card.definition}</div>`;
        if (card.example) html += `<div class="card-section"><strong>Example:</strong> ${card.example}</div>`;
        if (card.causes && card.causes.length) html += `<div class="card-section"><strong>Causes:</strong><ul>${card.causes.map(c=>'<li>'+c+'</li>').join('')}</ul></div>`;
        if (card.effects && card.effects.length) html += `<div class="card-section"><strong>Effects:</strong><ul>${card.effects.map(e=>'<li>'+e+'</li>').join('')}</ul></div>`;
        if (card.connections && card.connections.length) html += `<div class="card-section"><strong>Connections:</strong> ${card.connections.join(', ')}</div>`;
        html += '</div>';
        html += '</div></div>';

        // Buttons (hidden until flipped)
        html += '<div class="review-buttons" id="review-btns" style="visibility:hidden;"><button class="review-btn study-again" id="review-again">Study Again</button><button class="review-btn got-it" id="review-got">Got it</button></div>';

        container.innerHTML = html;

        // Bind flip
        const cardEl = document.getElementById('review-card');
        const btns = document.getElementById('review-btns');
        let flipped = false;
        cardEl.addEventListener('click', () => {
          if (!flipped) {
            cardEl.classList.add('flipped');
            btns.style.visibility = 'visible';
            flipped = true;
          }
        });

        // Got it
        document.getElementById('review-got').addEventListener('click', () => {
          const newLevel = Math.min((levels[card.term] || 1) + 1, 5);
          levels[card.term] = newLevel;
          saveReviewLevels(unitNum, levels);
          if (newLevel >= 5) {
            // Remove from study deck
            studyCards.splice(currentIdx, 1);
            // Don't increment currentIdx since array shifted
          } else {
            currentIdx++;
          }
          if (currentIdx >= studyCards.length && studyCards.length > 0) currentIdx = 0;
          renderState();
        });

        // Study Again
        document.getElementById('review-again').addEventListener('click', () => {
          levels[card.term] = 1;
          saveReviewLevels(unitNum, levels);
          currentIdx++;
          if (currentIdx >= studyCards.length) currentIdx = 0;
          renderState();
        });
      }

      renderState();
    }

    function startReadingQuizSession(unitNum, topicId, sectionName) {
      const topicData = readingQuizData[unitNum][topicId];
      let questions = [];

      if (sectionName === 'Overall') {
        for (const qs of Object.values(topicData.sections)) {
          questions = questions.concat(qs);
        }
      } else {
        questions = [...topicData.sections[sectionName]];
      }

      shuffle(questions);

      let current = 0;
      let rqScore = 0;

      const container = document.getElementById('reading-quiz-container');
      document.getElementById('prompt-bar').innerHTML = `<span>Topic ${topicId} — ${sectionName}</span>`;

      function renderQuestion() {
        const q = questions[current];
        const letters = ['A', 'B', 'C', 'D'];
        container.innerHTML = `
          <div class="rq-quiz">
            <div class="rq-progress">
              Question ${current + 1} of ${questions.length}
              <div class="rq-progress-bar"><div class="rq-progress-fill" style="width:${((current) / questions.length) * 100}%"></div></div>
            </div>
            <div class="rq-card">
              <div class="rq-question">${q.q}</div>
              <div class="rq-options">
                ${q.o.map((opt, i) => `
                  <button class="rq-option" data-idx="${i}">
                    <span class="option-letter">${letters[i]}</span>
                    <span>${opt}</span>
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
        `;

        container.querySelectorAll('.rq-option').forEach(btn => {
          btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
        });
      }

      function handleAnswer(idx) {
        const q = questions[current];
        const options = container.querySelectorAll('.rq-option');

        options.forEach(btn => {
          btn.classList.add('answered');
          const i = parseInt(btn.dataset.idx);
          if (i === q.a) btn.classList.add('correct');
          if (i === idx && idx !== q.a) btn.classList.add('wrong');
        });

        if (idx === q.a) {
          rqScore++;
          // Remove from redo if answered correctly
          removeFromRedo(unitNum, 'reading', q.q);
        } else {
          // Save wrong answer to redo
          addToRedo(unitNum, 'reading', q.q);
        }

        // Update progress bar fill
        const fill = container.querySelector('.rq-progress-fill');
        if (fill) fill.style.width = `${((current + 1) / questions.length) * 100}%`;

        // Add next button
        const card = container.querySelector('.rq-card');
        if (current < questions.length - 1) {
          const nextBtn = document.createElement('button');
          nextBtn.className = 'rq-next-btn';
          nextBtn.textContent = 'Next Question';
          nextBtn.addEventListener('click', () => { current++; renderQuestion(); });
          card.appendChild(nextBtn);
        } else {
          const nextBtn = document.createElement('button');
          nextBtn.className = 'rq-next-btn';
          nextBtn.textContent = 'See Results';
          nextBtn.addEventListener('click', showResults);
          card.appendChild(nextBtn);
        }
      }

      function showResults() {
        const pct = Math.round((rqScore / questions.length) * 100);
        const wrongCount = questions.length - rqScore;
        container.innerHTML = `
          <div class="rq-quiz">
            <div class="rq-card">
              <div class="rq-results">
                <div class="rq-score">${pct}%</div>
                <div class="rq-score-label">${rqScore} out of ${questions.length} correct</div>
                ${wrongCount > 0 ? `<div class="rq-redo-hint">${wrongCount} wrong — saved to your Redo list!</div>` : '<div class="rq-redo-hint" style="color:#8FD5BA;">Perfect score!</div>'}
                <button class="rq-retry-btn" id="rq-retry">Try Again</button>
                ${wrongCount > 0 ? `<button class="rq-redo-btn" id="rq-redo">Redo Wrong Ones (${wrongCount})</button>` : ''}
                <button class="rq-back-sections-btn" id="rq-back-sections">Back to Sections</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById('rq-retry').addEventListener('click', () => {
          shuffle(questions);
          current = 0;
          rqScore = 0;
          renderQuestion();
        });
        const redoBtn = document.getElementById('rq-redo');
        if (redoBtn) {
          redoBtn.addEventListener('click', () => {
            startRedoReadingQuiz(unitNum, topicId);
          });
        }
        document.getElementById('rq-back-sections').addEventListener('click', () => {
          showReadingQuizTopic(unitNum, topicId);
        });
      }

      renderQuestion();
    }

          showReadingQuizTopic(unitNum, topicId || Object.keys(readingQuizData[unitNum] || {})[0]);

        const redoAgain = document.getElementById('rq-redo-again');
        if (redoAgain) redoAgain.addEventListener('click', () => startRedoReadingQuiz(unitNum, topicId));
        document.getElementById('rq-back-redo').addEventListener('click', () => {
          if (topicId && readingQuizData[unitNum] && readingQuizData[unitNum][topicId]) {
            showReadingQuizTopic(unitNum, topicId);
          } else {
            showMapView();
            showUnitDetail(unitNum);
          }
        });
      }

      renderQuestion();
    }

    // ── Redo Map Quiz ──
    function startRedoMapQuiz(unitNum) {
      const redoNames = getRedoItems(unitNum, 'map');
      if (redoNames.length === 0) return;

      redoMode = true;
      mode = 'quiz';
      document.getElementById('btn-explore').classList.remove('active');
      document.getElementById('btn-quiz').classList.add('active');

      // Find the first map for this unit and load it
      const unit = unitData[unitNum];
      if (unit.items.length > 0) {
        const firstMap = unit.items[0].map;
        if (currentMapId !== firstMap) {
          loadMap(firstMap);
        }
      }

      // Override quiz queue with only redo features
      score = 0; total = 0; streak = 0;
      updateScore();

      function startRedoRound() {
        const features = geoData ? geoData.features : [];
        quizQueue = features.filter(f => redoNames.includes(featureName(f)));
        shuffle(quizQueue);

        if (quizQueue.length === 0) {
          document.getElementById('prompt-bar').innerHTML = '<span style="color:#8FD5BA">Nothing to redo on this map!</span>';
          redoMode = false;
          return;
        }
        nextQuizQuestion();
      }

      // Wait a tick for map data to load if needed
      if (geoData) {
        startRedoRound();
      } else {
        setTimeout(startRedoRound, 1500);
      }
    }

    function showUnitsList() {
      panelUnits.classList.remove('hidden');
      panelDetail.classList.remove('visible');
    }

    // Unit tab clicks
    document.querySelectorAll('.unit-tab').forEach(tab => {
      tab.addEventListener('click', () => showUnitDetail(tab.dataset.unit));
    });

    // Back button
    document.getElementById('back-btn').addEventListener('click', showUnitsList);

    // Open sidebar (stays on whatever panel you were on)
    document.getElementById('sidebar-toggle').addEventListener('click', openSidebar);

    // ── Initial load ──
    loadMap('us-states');
  </script>
</body>
</html>
